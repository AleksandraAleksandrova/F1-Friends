name: Flutter CI

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: flutter-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Static analysis
        run: flutter analyze

      - name: Unit tests
        run: flutter test

      - name: Write google-services.json (optional)
        if: ${{ secrets.GOOGLE_SERVICES_JSON != '' }}
        run: |
          mkdir -p android/app
          printf '%s' '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

      - name: Build debug APK (when Firebase config secret exists)
        if: ${{ secrets.GOOGLE_SERVICES_JSON != '' }}
        run: flutter build apk --debug
